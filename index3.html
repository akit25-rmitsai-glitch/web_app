<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style3.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">My Site</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<header class="hero d-flex align-items-center text-center text-white">
    <div class="container">
        <h1 class="display-4 animate">Адаптивний сайт</h1>
        <p class="lead animate">Bootstrap + анімація</p>
    </div>
</header>

<!-- Cards -->
<section class="py-5">
    <div class="container">
        <div class="row">

            <div class="col-md-4 mb-4">
                <div class="card animate">
                    <img src="https://picsum.photos/300/200" class="card-img-top" alt="img">
                    <div class="card-body">
                        <h5>Card 1</h5>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<footer class="bg-dark text-white text-center p-3">
    © 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
